version: "3.8"
services:
  devcontainer:
    image: ghcr.io/qnimbus/haefele-connect-mesh/devcontainer:latest
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/haefele-connect-mesh:cached
      - pip-cache:/home/vscode/.cache/pip
      - pip-local:/home/vscode/.local/lib
      - pip-bin:/home/vscode/.local/bin
      - npm-cache:/home/vscode/.npm
    command: sleep infinity

  # mosquitto service disabled — HA runs with embedded Mosquitto broker
  # mosquitto:
  #   image: eclipse-mosquitto:2
  #   restart: unless-stopped
  #   ports:
  #     - "0.0.0.0:1883:1883"
  #   volumes:
  #     - ../config/mosquitto:/mosquitto/config:ro
  #     - mosquitto-data:/mosquitto/data
  #     - ../config/mosquitto/log:/mosquitto/log
  #   entrypoint: >
  #     sh -c "chown -R mosquitto:mosquitto /mosquitto/log &&
  #            chmod 0700 /mosquitto/log &&
  #            exec mosquitto -c /mosquitto/config/mosquitto.conf"

volumes:
  # mosquitto-data:  # not used — HA manages its own Mosquitto broker
  pip-cache:
  pip-local:
  pip-bin:
  npm-cache:
