name: Build devcontainer image

on:
  push:
    branches:
      - main
    paths:
      - .devcontainer/Dockerfile
      - .devcontainer/docker-compose.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/devcontainer:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/devcontainer:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/devcontainer:cache,mode=max
